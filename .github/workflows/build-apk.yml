name: Android APK Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version name
        id: get_version
        run: |
          VERSION=$(grep -A 10 "defaultConfig" app/build.gradle.kts | grep "versionName" | sed 's/.*versionName = "\(.*\)".*/\1/')
          echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/app/keystore.jks"
          printf '%s' "$KEYSTORE_FILE" | base64 -d > "$KEYSTORE_PATH"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload Release APK
        uses: actions/upload-artifact@v6
        with:
          name: MyBili-v${{ steps.get_version.outputs.VERSION_NAME }}-release
          path: app/build/outputs/apk/release/MyBili-v${{ steps.get_version.outputs.VERSION_NAME }}-release.apk

      - name: Create GitHub Release
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        if: startsWith(github.ref, 'refs/tags/') && env.PERSONAL_ACCESS_TOKEN != ''
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/MyBili-v${{ steps.get_version.outputs.VERSION_NAME }}-release.apk
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
